backend = "xrender";
vsync = true;

shadow = true;
shadow-radius = 12;
shadow-opacity = 0.4;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-color = "#000000";
shadow-exclude = [
    "class_g = 'polybar'",
    "class_g = 'rofi'",
    "name = 'Notification'"
];

fading = true;
fade-in-step = 0.04;
fade-out-step = 0.04;
fade-delta = 3;

inactive-opacity = 0.90;
frame-opacity = 0.85;
active-opacity = 1.0;

rules: ({
    match = "class_g = 'Alacritty'";
    opacity = 0.95;
});

unredir-if-possible = false;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
use-damage = true;

wintypes:
{
    tooltip = { fade = true; shadow = false; opacity = 0.85; };
    dock = { shadow = false; };
    menu = { opacity = 0.95; };
};
