[bar/main]
width = 100%
height = 26
radius = 0
fixed-center = true
background = #0F0E17
foreground = #E0E0E0
line-size = 2
line-color = #A77BFF

modules-left = i3
modules-center =
modules-right = pulseaudio date

font-0 = JetBrainsMono Nerd Font:style=Regular:size=10;2
font-1 = JetBrainsMono Nerd Font:style=Bold:size=10;2

tray-position = right
tray-padding = 3
tray-background = #0F0E17

cursor-click = pointer
cursor-scroll = scrollbar

[module/i3]
type = internal/i3
format = <label-state>
label-focused = %name%
label-focused-background = #A77BFF
label-focused-foreground = #0F0E17
label-focused-underline = #A77BFF
label-focused-padding = 2

label-unfocused = %name%
label-unfocused-foreground = #888888
label-unfocused-padding = 2

label-visible = %name%
label-visible-foreground = #E0E0E0
label-visible-padding = 2

label-urgent = %name%
label-urgent-background = #FF6B9D
label-urgent-foreground = #FFFFFF
label-urgent-padding = 2

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <ramp-volume> <label-volume>
format-volume-foreground = #7DC4E4
format-muted = <label-muted>
format-muted-foreground = #888888
label-muted =  MUTED
label-volume = %percentage%%
ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 

[module/date]
type = internal/date
interval = 30
date = %a %d/%m %H:%M
date-alt = %Y-%m-%d %H:%M:%S
format = <label>
format-foreground = #E0E0E0
label = %date%
